<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 1.5rem;
            min-width: 400px;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 1.25rem;
            color: #e94560;
        }
        label {
            display: block;
            margin-bottom: 1rem;
        }
        .label-text {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .hint {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.2rem;
        }
        input, select {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #16213e;
            color: #eee;
            font-size: 0.85rem;
            font-family: monospace;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #e94560;
        }
        .saved {
            display: inline-block;
            color: #4ecca3;
            font-size: 0.8rem;
            margin-left: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .saved.show { opacity: 1; }
        .shortcut-note {
            font-size: 0.78rem;
            color: #888;
            line-height: 1.5;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #333;
        }
        kbd {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid #555;
            background: #16213e;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>Flaming Vulpine Whisperer</h1>

    <label>
        <span class="label-text">Whisper API endpoint</span>
        <input type="url" id="endpoint" placeholder="https://voice.example.com">
        <span class="hint">/v1/audio/transcriptions is appended automatically</span>
    </label>

    <label>
        <span class="label-text">Language (optional)</span>
        <select id="language">
            <option value="">Auto-detect</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="pt">Portuguese</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="ko">Korean</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
        </select>
        <span class="hint">Force Whisper to transcribe in a specific language</span>
    </label>

    <span id="savedIndicator" class="saved">Saved</span>

    <div class="shortcut-note">
        Hold <kbd>Alt</kbd>+<kbd>R</kbd> to record. Rebind in
        <kbd>about:addons</kbd> &rarr; gear icon &rarr; Manage Extension Shortcuts.
    </div>

    <script src="options.js"></script>
</body>
</html>
